# Headless-only Compose profile for SkeinRank Phase A.
# It starts the governance API and PostgreSQL without UI, Elasticsearch,
# RabbitMQ, or Celery workers. Use it for dictionary apply/export and
# binding-scoped runtime snapshot artifact smoke tests.

services:
  postgres:
    image: postgres:16.4-alpine
    container_name: skeinrank-postgres-headless
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skeinrank_headless_password}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15433}:5432"
    volumes:
      - skeinrank_headless_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-app_user} -d $${POSTGRES_DB:-app_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  governance-migrate:
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    image: skeinrank-governance-api:headless
    container_name: skeinrank-governance-migrate-headless
    restart: "no"
    environment: &governance_headless_env
      SKEINRANK_GOVERNANCE_API_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-skeinrank_headless_password}@postgres:5432/${POSTGRES_DB:-app_db}
      SKEINRANK_GOVERNANCE_API_AUTH_ENABLED: ${SKEINRANK_GOVERNANCE_API_AUTH_ENABLED:-false}
      SKEINRANK_GOVERNANCE_API_BOOTSTRAP_ADMIN: ${SKEINRANK_GOVERNANCE_API_BOOTSTRAP_ADMIN:-false}
      SKEINRANK_GOVERNANCE_API_CORS_ORIGINS: ${SKEINRANK_GOVERNANCE_API_CORS_ORIGINS:-http://127.0.0.1:8010,http://localhost:8010}
      SKEINRANK_GOVERNANCE_API_ENRICHMENT_JOBS_BACKEND: ${SKEINRANK_GOVERNANCE_API_ENRICHMENT_JOBS_BACKEND:-sync}
      SKEINRANK_GOVERNANCE_API_OBSERVABILITY_ENABLED: ${SKEINRANK_GOVERNANCE_API_OBSERVABILITY_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_LOG_FORMAT: ${SKEINRANK_GOVERNANCE_API_LOG_FORMAT:-json}
      SKEINRANK_GOVERNANCE_API_LOG_LEVEL: ${SKEINRANK_GOVERNANCE_API_LOG_LEVEL:-info}
      SKEINRANK_GOVERNANCE_API_ACCESS_LOG_ENABLED: ${SKEINRANK_GOVERNANCE_API_ACCESS_LOG_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_REQUEST_ID_HEADER: ${SKEINRANK_GOVERNANCE_API_REQUEST_ID_HEADER:-X-Request-ID}
      SKEINRANK_GOVERNANCE_API_METRICS_ENABLED: ${SKEINRANK_GOVERNANCE_API_METRICS_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_METRICS_PATH: ${SKEINRANK_GOVERNANCE_API_METRICS_PATH:-/metrics}
      SKEINRANK_GOVERNANCE_API_TRACING_ENABLED: ${SKEINRANK_GOVERNANCE_API_TRACING_ENABLED:-false}
      SKEINRANK_GOVERNANCE_API_OTEL_TRACES_EXPORTER: ${SKEINRANK_GOVERNANCE_API_OTEL_TRACES_EXPORTER:-none}
    command: ["python", "-m", "skeinrank_governance_api.migrations", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  governance-api:
    image: skeinrank-governance-api:headless
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    container_name: skeinrank-governance-api-headless
    restart: unless-stopped
    environment:
      <<: *governance_headless_env
    command:
      ["skeinrank-governance-api", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "127.0.0.1:${GOVERNANCE_API_PORT:-8010}:8010"
    depends_on:
      postgres:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:8010/readyz\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ok\" else 1)'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  skeinrank_headless_postgres_data:
