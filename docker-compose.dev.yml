services:
  postgres:
    image: postgres:16.4-alpine
    container_name: skeinrank-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
      POSTGRES_USER: ${POSTGRES_USER:-app_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skeinrank_dev_password}
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - skeinrank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER:-app_user} -d $${POSTGRES_DB:-app_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: skeinrank-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-skeinrank}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-skeinrank_dev_password}
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - skeinrank_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: skeinrank-elasticsearch-dev
    restart: unless-stopped
    environment:
      discovery.type: single-node
      node.name: es01
      xpack.security.enabled: "false"
      xpack.security.http.ssl.enabled: "false"
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
      bootstrap.memory_lock: "true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-19200}:9200"
    volumes:
      - skeinrank_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200 >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  governance-migrate:
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    image: skeinrank-governance-api:dev
    container_name: skeinrank-governance-migrate-dev
    restart: "no"
    environment: &governance_env
      SKEINRANK_GOVERNANCE_API_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app_user}:${POSTGRES_PASSWORD:-skeinrank_dev_password}@postgres:5432/${POSTGRES_DB:-app_db}
      SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_URL: http://elasticsearch:9200
      SKEINRANK_GOVERNANCE_API_AUTH_ENABLED: ${SKEINRANK_GOVERNANCE_API_AUTH_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_BOOTSTRAP_ADMIN: ${SKEINRANK_GOVERNANCE_API_BOOTSTRAP_ADMIN:-true}
      SKEINRANK_GOVERNANCE_API_ADMIN_USERNAME: ${SKEINRANK_GOVERNANCE_API_ADMIN_USERNAME:-admin}
      SKEINRANK_GOVERNANCE_API_ADMIN_PASSWORD: ${SKEINRANK_GOVERNANCE_API_ADMIN_PASSWORD:-change-me}
      SKEINRANK_GOVERNANCE_API_ADMIN_DISPLAY_NAME: ${SKEINRANK_GOVERNANCE_API_ADMIN_DISPLAY_NAME:-SkeinRank Admin}
      SKEINRANK_GOVERNANCE_API_CORS_ORIGINS: ${SKEINRANK_GOVERNANCE_API_CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      SKEINRANK_GOVERNANCE_API_ENRICHMENT_JOBS_BACKEND: ${SKEINRANK_GOVERNANCE_API_ENRICHMENT_JOBS_BACKEND:-celery}
      SKEINRANK_GOVERNANCE_API_CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-skeinrank}:${RABBITMQ_DEFAULT_PASS:-skeinrank_dev_password}@rabbitmq:5672//
      SKEINRANK_GOVERNANCE_API_CELERY_TASK_QUEUE: ${SKEINRANK_GOVERNANCE_API_CELERY_TASK_QUEUE:-skeinrank.enrichment}
      SKEINRANK_GOVERNANCE_API_ENRICHMENT_CHUNK_SIZE: ${SKEINRANK_GOVERNANCE_API_ENRICHMENT_CHUNK_SIZE:-500}
      SKEINRANK_GOVERNANCE_API_OBSERVABILITY_ENABLED: ${SKEINRANK_GOVERNANCE_API_OBSERVABILITY_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_LOG_FORMAT: ${SKEINRANK_GOVERNANCE_API_LOG_FORMAT:-json}
      SKEINRANK_GOVERNANCE_API_LOG_LEVEL: ${SKEINRANK_GOVERNANCE_API_LOG_LEVEL:-info}
      SKEINRANK_GOVERNANCE_API_ACCESS_LOG_ENABLED: ${SKEINRANK_GOVERNANCE_API_ACCESS_LOG_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_REQUEST_ID_HEADER: ${SKEINRANK_GOVERNANCE_API_REQUEST_ID_HEADER:-X-Request-ID}
      SKEINRANK_GOVERNANCE_API_METRICS_ENABLED: ${SKEINRANK_GOVERNANCE_API_METRICS_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_METRICS_PATH: ${SKEINRANK_GOVERNANCE_API_METRICS_PATH:-/metrics}
    command: ["python", "-m", "skeinrank_governance_api.migrations", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  governance-api:
    image: skeinrank-governance-api:dev
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    container_name: skeinrank-governance-api-dev
    restart: unless-stopped
    environment:
      <<: *governance_env
    command:
      ["skeinrank-governance-api", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "127.0.0.1:${GOVERNANCE_API_PORT:-8010}:8010"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:8010/readyz\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ok\" else 1)'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  governance-worker:
    image: skeinrank-governance-api:dev
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    container_name: skeinrank-governance-worker-dev
    restart: unless-stopped
    environment:
      <<: *governance_env
    command:
      [
        "skeinrank-governance-worker",
        "--loglevel",
        "info",
        "--queues",
        "${SKEINRANK_GOVERNANCE_API_CELERY_TASK_QUEUE:-skeinrank.enrichment}",
        "--pool",
        "solo",
        "--concurrency",
        "1",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully

  ui:
    build:
      context: .
      dockerfile: deploy/docker/ui.Dockerfile
    image: skeinrank-ui:dev
    container_name: skeinrank-ui-dev
    restart: unless-stopped
    environment:
      VITE_SKEINRANK_GOVERNANCE_API_URL: ${VITE_SKEINRANK_GOVERNANCE_API_URL:-http://127.0.0.1:8010}
    ports:
      - "127.0.0.1:${UI_PORT:-5173}:5173"
    depends_on:
      governance-api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: skeinrank-prometheus-dev
    profiles: ["observability"]
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - skeinrank_prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      governance-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    container_name: skeinrank-grafana-dev
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - skeinrank_grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

volumes:
  skeinrank_postgres_data:
  skeinrank_rabbitmq_data:
  skeinrank_elasticsearch_data:
  skeinrank_prometheus_data:
  skeinrank_grafana_data:
