# GitHub labels for the SkeinRank repository.
# GitHub does not automatically apply labels from this file.
# Use docs/community/github-labels.md to sync them with GitHub CLI.

- name: "type: bug"
  color: "d73a4a"
  description: "Something is broken or behaving incorrectly."
- name: "type: feature"
  color: "a2eeef"
  description: "A new capability, API, UI flow, or product feature."
- name: "type: docs"
  color: "0075ca"
  description: "Documentation, examples, diagrams, or README changes."
- name: "type: refactor"
  color: "cfd3d7"
  description: "Internal cleanup without intended behavior change."
- name: "type: question"
  color: "d876e3"
  description: "A concrete question that belongs in Issues rather than Discussions."
- name: "type: integration"
  color: "0e8a16"
  description: "Integration work for search backends, agents, MCP, GitOps, or external tools."

- name: "area: governance-api"
  color: "1d76db"
  description: "FastAPI governance/control-plane API."
- name: "area: ui"
  color: "5319e7"
  description: "React governance console and product UI."
- name: "area: core"
  color: "0052cc"
  description: "Core SDK, dictionary logic, canonicalization, and extraction."
- name: "area: elasticsearch"
  color: "fbca04"
  description: "Elasticsearch/OpenSearch evidence, enrichment, and alias swap flows."
- name: "area: mcp"
  color: "8b5cf6"
  description: "MCP server, agent tools, and client integration docs."
- name: "area: docs"
  color: "0ea5e9"
  description: "Docs site, README, guides, diagrams, and examples."
- name: "area: ci"
  color: "f9d0c4"
  description: "GitHub Actions, tests, linting, release, and packaging automation."
- name: "area: site"
  color: "22d3ee"
  description: "Public website, landing page, and visual positioning."

- name: "status: needs-triage"
  color: "ededed"
  description: "Needs maintainer review before implementation."
- name: "status: accepted"
  color: "0e8a16"
  description: "Accepted for implementation or documentation work."
- name: "status: blocked"
  color: "b60205"
  description: "Blocked by another decision, dependency, or missing information."
- name: "status: good-first-issue"
  color: "7057ff"
  description: "Good for first-time contributors."

- name: "priority: p0"
  color: "b60205"
  description: "Critical: breaks releases, data safety, or core runtime behavior."
- name: "priority: p1"
  color: "d93f0b"
  description: "High priority: important public beta, runtime, or operator issue."
- name: "priority: p2"
  color: "fbca04"
  description: "Normal priority: useful but not immediately blocking."
