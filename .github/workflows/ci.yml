name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.8.0

      - name: Run Ruff lint
        run: |
          ruff check \
            packages/skeinrank-core/skeinrank packages/skeinrank-core/tests \
            packages/skeinrank-server/skeinrank_server packages/skeinrank-server/tests \
            packages/skeinrank-provider-elasticsearch/skeinrank_provider_elasticsearch packages/skeinrank-provider-elasticsearch/tests \
            packages/skeinrank-governance/skeinrank_governance packages/skeinrank-governance/tests \
            packages/skeinrank-governance-api/skeinrank_governance_api packages/skeinrank-governance-api/tests

      - name: Check Ruff formatting
        run: |
          ruff format --check \
            packages/skeinrank-core/skeinrank packages/skeinrank-core/tests \
            packages/skeinrank-server/skeinrank_server packages/skeinrank-server/tests \
            packages/skeinrank-provider-elasticsearch/skeinrank_provider_elasticsearch packages/skeinrank-provider-elasticsearch/tests \
            packages/skeinrank-governance/skeinrank_governance packages/skeinrank-governance/tests \
            packages/skeinrank-governance-api/skeinrank_governance_api packages/skeinrank-governance-api/tests

  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/skeinrank-core
          - packages/skeinrank-server
          - packages/skeinrank-provider-elasticsearch
          - packages/skeinrank-governance
          - packages/skeinrank-governance-api
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: poetry install --no-interaction

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: poetry run pytest -q

  ui:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI dependencies
        working-directory: packages/skeinrank-ui
        run: npm install

      - name: Run UI typecheck
        working-directory: packages/skeinrank-ui
        run: npm run typecheck

      - name: Run UI tests
        working-directory: packages/skeinrank-ui
        run: npm test -- --run

      - name: Build UI
        working-directory: packages/skeinrank-ui
        run: npm run build
