name: publish-skeinrank-core

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Publish target. Use testpypi first."
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
      dry_run:
        description: "Build and validate only; do not publish."
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build and validate core package
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/skeinrank-core

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry and packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry twine

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run tests
        run: poetry run pytest -q

      - name: Build wheel and sdist
        run: poetry build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke-test built wheel
        run: |
          python -m venv /tmp/skeinrank-wheel-smoke
          /tmp/skeinrank-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/skeinrank-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/skeinrank-wheel-smoke/bin/python -c "import skeinrank; print(skeinrank.__version__)"
          /tmp/skeinrank-wheel-smoke/bin/skeinrank --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: skeinrank-core-dist
          path: packages/skeinrank-core/dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish core package to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == false && inputs.repository == 'testpypi' }}
    environment: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: skeinrank-core-dist
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish core package to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: ${{ inputs.dry_run == false && inputs.repository == 'pypi' }}
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: skeinrank-core-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
