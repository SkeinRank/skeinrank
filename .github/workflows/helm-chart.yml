name: helm-chart

on:
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/helm-chart.yml"
      - "docs/deployment/helm-chart.md"
      - "packages/skeinrank-governance-api/tests/test_helm_chart_alpha.py"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - ".github/workflows/helm-chart.yml"
      - "docs/deployment/helm-chart.md"
      - "packages/skeinrank-governance-api/tests/test_helm_chart_alpha.py"
  workflow_dispatch:

jobs:
  helm:
    name: lint and render chart
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Lint chart
        run: helm lint charts/skeinrank

      - name: Render chart
        run: |
          helm template skeinrank charts/skeinrank \
            --namespace skeinrank \
            --set secrets.databaseUrl='postgresql+psycopg://app_user:skeinrank_dev_password@postgres:5432/app_db' \
            --set secrets.celeryBrokerUrl='amqp://skeinrank:skeinrank_dev_password@rabbitmq:5672//' \
            --set config.elasticsearchUrl='http://elasticsearch:9200' \
            --set config.uiGovernanceApiUrl='http://localhost:8010' \
            > /tmp/skeinrank-chart.yaml

      - name: Check rendered core resources
        run: |
          grep -q 'kind: Deployment' /tmp/skeinrank-chart.yaml
          grep -q 'skeinrank-governance-api' /tmp/skeinrank-chart.yaml
          grep -q 'skeinrank-governance-worker' /tmp/skeinrank-chart.yaml
          grep -q 'skeinrank-ui' /tmp/skeinrank-chart.yaml
          grep -q 'kind: Job' /tmp/skeinrank-chart.yaml
