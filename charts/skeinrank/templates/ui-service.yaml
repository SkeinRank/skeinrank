apiVersion: v1
kind: Service
metadata:
  name: {{ include "skeinrank.fullname" . }}-ui
  labels:
    {{- include "skeinrank.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  type: {{ .Values.ui.service.type }}
  ports:
    - name: http
      port: {{ .Values.ui.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "skeinrank.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: ui
