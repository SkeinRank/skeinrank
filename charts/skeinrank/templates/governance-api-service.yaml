apiVersion: v1
kind: Service
metadata:
  name: {{ include "skeinrank.fullname" . }}-governance-api
  labels:
    {{- include "skeinrank.labels" . | nindent 4 }}
    app.kubernetes.io/component: governance-api
spec:
  type: {{ .Values.governanceApi.service.type }}
  ports:
    - name: http
      port: {{ .Values.governanceApi.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "skeinrank.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: governance-api
