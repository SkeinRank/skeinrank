apiVersion: apps/v1
kind: Deployment
metadata:
  name: skeinrank-runtime-worker
  labels:
    app.kubernetes.io/name: skeinrank-runtime-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: skeinrank-runtime-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skeinrank-runtime-worker
    spec:
      containers:
        - name: runtime-worker
          image: registry.example.com/search-platform/runtime-worker:latest
          env:
            - name: SKEINRANK_RUNTIME_SNAPSHOT_FILE
              value: /etc/skeinrank/runtime/runtime-snapshot.json
          volumeMounts:
            - name: skeinrank-runtime-snapshot
              mountPath: /etc/skeinrank/runtime/runtime-snapshot.json
              subPath: runtime-snapshot.json
              readOnly: true
      volumes:
        - name: skeinrank-runtime-snapshot
          configMap:
            name: skeinrank-runtime-snapshot
