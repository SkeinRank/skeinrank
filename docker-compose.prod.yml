# Production-oriented Compose profile for SkeinRank.
# Copy .env.production.example to .env, replace every CHANGE_ME value, and review
# docs/deployment/security.md before using this file outside local testing.

name: ${COMPOSE_PROJECT_NAME:-skeinrank-prod}

x-skeinrank-logging: &skeinrank_logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}

x-governance-healthcheck: &governance_healthcheck
  test:
    [
      "CMD-SHELL",
      "python -c 'import json, urllib.request; data=json.load(urllib.request.urlopen(\"http://127.0.0.1:8010/healthz\", timeout=5)); raise SystemExit(0 if data.get(\"status\") == \"ok\" else 1)'",
    ]
  interval: 10s
  timeout: 5s
  retries: 10
  start_period: 20s

services:
  postgres:
    image: postgres:16.4-alpine
    restart: unless-stopped
    logging: *skeinrank_logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${TZ:-UTC}
    volumes:
      - skeinrank_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13.7-management
    restart: unless-stopped
    logging: *skeinrank_logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}
    volumes:
      - skeinrank_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  governance-migrate:
    init: true
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    image: skeinrank-governance-api:prod
    restart: "no"
    logging: *skeinrank_logging
    environment: &governance_env
      SKEINRANK_ENV: production
      SKEINRANK_GOVERNANCE_API_ENV: production
      SKEINRANK_GOVERNANCE_API_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SKEINRANK_GOVERNANCE_API_AUTH_ENABLED: "true"
      SKEINRANK_GOVERNANCE_API_BOOTSTRAP_ADMIN: ${SKEINRANK_GOVERNANCE_API_BOOTSTRAP_ADMIN:-true}
      SKEINRANK_GOVERNANCE_API_ADMIN_USERNAME: ${SKEINRANK_GOVERNANCE_API_ADMIN_USERNAME:-admin}
      SKEINRANK_GOVERNANCE_API_ADMIN_PASSWORD: ${SKEINRANK_GOVERNANCE_API_ADMIN_PASSWORD:?SKEINRANK_GOVERNANCE_API_ADMIN_PASSWORD is required}
      SKEINRANK_GOVERNANCE_API_ADMIN_DISPLAY_NAME: ${SKEINRANK_GOVERNANCE_API_ADMIN_DISPLAY_NAME:-SkeinRank Admin}
      SKEINRANK_GOVERNANCE_API_TOKEN_TTL_HOURS: ${SKEINRANK_GOVERNANCE_API_TOKEN_TTL_HOURS:-12}
      SKEINRANK_GOVERNANCE_API_CORS_ORIGINS: ${SKEINRANK_GOVERNANCE_API_CORS_ORIGINS:?SKEINRANK_GOVERNANCE_API_CORS_ORIGINS is required}
      SKEINRANK_GOVERNANCE_API_PRODUCTION_SECURITY_ENABLED: ${SKEINRANK_GOVERNANCE_API_PRODUCTION_SECURITY_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_URL: ${SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_URL:-}
      SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_USERNAME: ${SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_USERNAME:-}
      SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_PASSWORD: ${SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_PASSWORD:-}
      SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_API_KEY: ${SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_API_KEY:-}
      SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_TIMEOUT_SECONDS: ${SKEINRANK_GOVERNANCE_API_ELASTICSEARCH_TIMEOUT_SECONDS:-10}
      SKEINRANK_GOVERNANCE_API_ENRICHMENT_JOBS_BACKEND: celery
      SKEINRANK_GOVERNANCE_API_CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER is required}:${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required}@rabbitmq:5672//
      SKEINRANK_GOVERNANCE_API_CELERY_TASK_QUEUE: ${SKEINRANK_GOVERNANCE_API_CELERY_TASK_QUEUE:-skeinrank.enrichment}
      SKEINRANK_GOVERNANCE_API_ENRICHMENT_CHUNK_SIZE: ${SKEINRANK_GOVERNANCE_API_ENRICHMENT_CHUNK_SIZE:-500}
      SKEINRANK_GOVERNANCE_API_OBSERVABILITY_ENABLED: ${SKEINRANK_GOVERNANCE_API_OBSERVABILITY_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_LOG_FORMAT: ${SKEINRANK_GOVERNANCE_API_LOG_FORMAT:-json}
      SKEINRANK_GOVERNANCE_API_LOG_LEVEL: ${SKEINRANK_GOVERNANCE_API_LOG_LEVEL:-info}
      SKEINRANK_GOVERNANCE_API_ACCESS_LOG_ENABLED: ${SKEINRANK_GOVERNANCE_API_ACCESS_LOG_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_REQUEST_ID_HEADER: ${SKEINRANK_GOVERNANCE_API_REQUEST_ID_HEADER:-X-Request-ID}
      SKEINRANK_GOVERNANCE_API_METRICS_ENABLED: ${SKEINRANK_GOVERNANCE_API_METRICS_ENABLED:-true}
      SKEINRANK_GOVERNANCE_API_METRICS_PATH: ${SKEINRANK_GOVERNANCE_API_METRICS_PATH:-/metrics}
      SKEINRANK_GOVERNANCE_API_TRACING_ENABLED: ${SKEINRANK_GOVERNANCE_API_TRACING_ENABLED:-false}
      SKEINRANK_GOVERNANCE_API_OTEL_SERVICE_NAME: ${SKEINRANK_GOVERNANCE_API_OTEL_SERVICE_NAME:-skeinrank-governance-api}
      SKEINRANK_GOVERNANCE_API_OTEL_TRACES_EXPORTER: ${SKEINRANK_GOVERNANCE_API_OTEL_TRACES_EXPORTER:-none}
      SKEINRANK_GOVERNANCE_API_OTEL_EXPORTER_OTLP_ENDPOINT: ${SKEINRANK_GOVERNANCE_API_OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      SKEINRANK_GOVERNANCE_API_OTEL_SAMPLING_RATIO: ${SKEINRANK_GOVERNANCE_API_OTEL_SAMPLING_RATIO:-1.0}
      SKEINRANK_GOVERNANCE_API_OTEL_CAPTURE_QUERY_TEXT: ${SKEINRANK_GOVERNANCE_API_OTEL_CAPTURE_QUERY_TEXT:-false}
    command: ["python", "-m", "skeinrank_governance_api.migrations", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  governance-api:
    init: true
    image: skeinrank-governance-api:prod
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *skeinrank_logging
    environment:
      <<: *governance_env
    command:
      ["skeinrank-governance-api", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "127.0.0.1:${GOVERNANCE_API_PORT:-8010}:8010"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully
    healthcheck: *governance_healthcheck

  governance-worker:
    init: true
    image: skeinrank-governance-api:prod
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    restart: unless-stopped
    stop_grace_period: 60s
    logging: *skeinrank_logging
    environment:
      <<: *governance_env
    command:
      [
        "skeinrank-governance-worker",
        "--loglevel",
        "info",
        "--queues",
        "${SKEINRANK_GOVERNANCE_API_CELERY_TASK_QUEUE:-skeinrank.enrichment}",
        "--pool",
        "solo",
        "--concurrency",
        "1",
      ]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully

  ui:
    init: true
    build:
      context: .
      dockerfile: deploy/docker/ui.Dockerfile
    image: skeinrank-ui:prod
    restart: unless-stopped
    logging: *skeinrank_logging
    environment:
      VITE_SKEINRANK_GOVERNANCE_API_URL: ${VITE_SKEINRANK_GOVERNANCE_API_URL:?VITE_SKEINRANK_GOVERNANCE_API_URL is required}
    ports:
      - "127.0.0.1:${UI_PORT:-5173}:5173"
    depends_on:
      governance-api:
        condition: service_healthy


  governance-schema-check:
    init: true
    image: skeinrank-governance-api:prod
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    profiles: ["ops"]
    restart: "no"
    logging: *skeinrank_logging
    environment:
      <<: *governance_env
    command: ["python", "-m", "skeinrank_governance_api.migrations", "check"]
    depends_on:
      postgres:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully

  governance-backup-export:
    init: true
    image: skeinrank-governance-api:prod
    build:
      context: .
      dockerfile: deploy/docker/governance-api.Dockerfile
    profiles: ["ops"]
    restart: "no"
    logging: *skeinrank_logging
    environment:
      <<: *governance_env
    command:
      [
        "sh",
        "-lc",
        "mkdir -p /backups && python -m skeinrank_governance_api.backup_restore export --out /backups/governance-$$(date -u +%Y%m%dT%H%M%SZ).json",
      ]
    volumes:
      - skeinrank_postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
      governance-migrate:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    restart: unless-stopped
    logging: *skeinrank_logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - skeinrank_prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      governance-api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.5.2
    profiles: ["observability"]
    restart: unless-stopped
    logging: *skeinrank_logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - skeinrank_grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  skeinrank_postgres_data:
  skeinrank_rabbitmq_data:
  skeinrank_postgres_backups:
  skeinrank_prometheus_data:
  skeinrank_grafana_data:
