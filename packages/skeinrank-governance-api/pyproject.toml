[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "skeinrank-governance-api"
version = "0.1.0"
description = "FastAPI control-plane API skeleton for SkeinRank terminology governance"
readme = "README.md"
authors = ["SkeinRank"]
license = "Apache-2.0"
keywords = ["skeinrank", "governance", "fastapi", "terminology", "control-plane"]
packages = [{ include = "skeinrank_governance_api" }]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
fastapi = ">=0.110,<1.0"
uvicorn = {version = ">=0.27,<1.0", extras = ["standard"]}
sqlalchemy = ">=2.0,<3.0"
psycopg = { version = ">=3,<4", extras = ["binary"] }
pydantic = ">=2.0,<3.0"
celery = ">=5.4,<6.0"
skeinrank-governance = { path = "../skeinrank-governance", develop = true }

[tool.poetry.scripts]
skeinrank-governance-api = "skeinrank_governance_api.cli:main"
skeinrank-migrate = "skeinrank_governance_api.migration_tool:main"
skeinrank-governance-worker = "skeinrank_governance_api.worker_cli:main"
skeinrank-governance-backup = "skeinrank_governance_api.backup_restore:main"
skeinrank-governance-env = "skeinrank_governance_api.env_validation:main"
skeinrank-governance-benchmark = "skeinrank_governance_api.benchmark:main"
skeinrank-governance-benchmark-stack = "skeinrank_governance_api.benchmark_stack:main"
skeinrank-governance-retrieval-eval = "skeinrank_governance_api.retrieval_eval:main"
skeinrank-governance-retrieval-compare = "skeinrank_governance_api.retrieval_compare:main"
skeinrank-governance-synthetic-smoke = "skeinrank_governance_api.synthetic_smoke:main"
skeinrank-governance-pilot = "skeinrank_governance_api.pilot_integration:main"
skeinrank-mcp = "skeinrank_governance_api.mcp:main"

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0"
pytest-cov = ">=4.1"
httpx = ">=0.27,<1.0"


[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
