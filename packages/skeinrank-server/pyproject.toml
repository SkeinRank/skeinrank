[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "skeinrank-server"
version = "0.1.0"
description = "Enterprise-friendly HTTP server wrapper for SkeinRank core (external Elasticsearch)."
authors = ["NkvMax"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/SkeinRank"
repository = "https://github.com/SkeinRank/skeinrank"
keywords = ["search", "reranking", "retrieval", "bm25", "rag", "elasticsearch", "fastapi"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
]
packages = [{ include = "skeinrank_server" }]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"

# Web server
fastapi = ">=0.110,<1.0"
uvicorn = { version = ">=0.23,<1.0", extras = ["standard"] }

# HTTP client (Elasticsearch)
httpx = ">=0.25,<1.0"

# Schemas
pydantic = ">=2.6,<3.0"

# Core (monorepo path dependency, editable)
skeinrank = { path = "../skeinrank-core", develop = true }

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-cov = ">=4.1"
ruff = ">=0.3"
mypy = ">=1.8"

[tool.poetry.scripts]
skeinrank-server = "skeinrank_server.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"