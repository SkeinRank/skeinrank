[build-system]
requires = ["poetry-core>=1.9.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "skeinrank"
version = "0.12.0"
description = "Dictionary-first extraction, alias canonicalization, and lightweight reranking utilities for technical documents."
authors = ["NkvMax"]
license = "Apache-2.0"
readme = "README.md"
homepage = "https://github.com/SkeinRank"
repository = "https://github.com/SkeinRank/skeinrank-core"
keywords = ["search", "retrieval", "reranking", "rag", "canonicalization", "dictionary", "aliases", "documents"]
classifiers = [
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "Topic :: Software Development :: Libraries :: Python Modules",
  "Topic :: Text Processing :: Linguistic",
]
packages = [{ include = "skeinrank" }]
include = [
  { path = "skeinrank/attributes/config/*.json", format = ["sdist", "wheel"] },
  { path = "skeinrank/py.typed", format = ["sdist", "wheel"] },
  { path = "docs/PUBLISHING.md", format = ["sdist"] }
]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
pydantic = ">=2.6,<3"
typing-extensions = {version = ">=4.7", markers = "python_version < '3.11'"}

# The core SDK intentionally has no ML runtime dependencies.

[tool.poetry.scripts]
skeinrank = "skeinrank.cli:entrypoint"
skeinrank-extract = "skeinrank.attributes.cli:extract_main"
skeinrank-enrich-jsonl = "skeinrank.attributes.cli:enrich_jsonl_main"
skeinrank-eval-demo = "skeinrank.attributes.cli:eval_demo_main"
skeinrank-validate-profile = "skeinrank.attributes.cli:validate_profile_main"
skeinrank-init-profile = "skeinrank.attributes.cli:init_profile_main"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.4"
pytest-cov = ">=4.1"
exceptiongroup = {version = ">=1.2,<2", markers = "python_version < \"3.11\""}

[tool.poetry.urls]
Homepage = "https://github.com/SkeinRank"
Repository = "https://github.com/SkeinRank/skeinrank-core"
Issues = "https://github.com/SkeinRank/skeinrank-core/issues"
